<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <title>AP-Music</title>
  <link rel="stylesheet" href="./css/reset.css" />
  <link rel="stylesheet" href="./css/index.css" />
  <script type="module" src="./js/index.js"></script>

<body>
  <div class="landingcontainer">

    <header class="landingheader">
      <div class="landingtitel">
        <img id="logo" src="./assets/images/logo_AP-Music.png" alt="">
      </div>
      <div class="landingprofiel">
      </div>
    </header>

    <main class="projecten">

      <div class="projectkeuze">
        <button class="projectkeuze-button" id="lego"></button>
        <div class="ondertekstProject">Lego Masters</div>
      </div>

      <div class="projectkeuze">
        <button class="projectkeuze-button-ToHome" id="music"></button>
        <div class="ondertekstProject">Music Match</div>
      </div>

      <div class="projectkeuze">
        <button class="projectkeuze-button" id="gameHub"></button>
        <div class="ondertekstProject">Game Hub</div>
      </div>
    </main>
    <footer>
      <p>&copy;AP-Music</p>
    </footer>
  </div>
  <!-- INLOG FORMULIER ERROR DEEL -->

  <section class="hidden" id="inlogErrorBox">
    <div id="inlogError">
      <h3>ERROR</h3>
      <p>Je hebt geen toegang tot dit spel.</p>
    </div>
    <button class="buttonError">OK</button>
    <button class="buttonInlog">Inloggen</button>
  </section>
