<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author 1" content="Dom Kevin" />
    <meta name="author 2" content="Opong Nana" />
    <meta name="author 3" content="Kyaro Van Goethem" />
    <title>AP-Music</title>
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/general.css" />
    <link rel="stylesheet" href="./css/geuss_game.css">
    <script type="module" src="./js/geuss_game.js" defer></script>
    <script type="module" defer src="./js/generalJava.js"></script>
</head>

<body class="body-home">
    <header>
        <div class="header-inner">
            <div class="header-logo">
                <a href="./homepage.html"><img src="./assets/images/logo_AP-Music.png" class="logo-header" /></a>
            </div>
            <form class="header-search search-form hidden" action="">
                <input class="search-input" type="search" placeholder="Nummer zoeken?" value="" />
                <button class="search-button2">OK</button>
            </form>
            <div class="header-buttons">
                <div class="header-search-button">
                    <button class="search-button">
                        <img src="./assets/icons/iconmonstr-magnifier-lined-240.png" class="icon-header" />
                    </button>
                </div>
                <div class="header-accountbutton">
                    <a href="./accountpage.html" class="background-icons"><img class="icon-header" id="moodIcon"
                            src="./assets/icons/moods/smile.png" alt="" /></a>
                </div>
                <div class="header-menuButton">
                    <button id="menu-button" class="background-icons">
                        <img class="icon-header" src="./assets/icons/iconmonstr-menu-lined.svg" alt="" />
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- START MAIN  -->

    <main class="mainHomePage">
        <div id="dropdownMenu" class="menu hidden">
            <a href="./accountpage.html" class="background-dropdown">Account</a>
            <a class="background-dropdown">Favorieten</a>
            <a href="./game.html" class="background-dropdown">Muziek Spel</a>
            <a class="background-dropdown">Geschiedenis</a>
            <a href="./playlist_generator.html" class="background-dropdown">Playlist</a>
            <a href="./accountpage.html" class="background-dropdown">Mood</a>
            <a class="background-dropdown" href="">UITLOGGEN</a>
        </div>

        <section class="musicplayer main-item2">
            <div class="player-container">
                <div class="music-left-logo">
                    <img class="music-logo" src="./assets/album-covers/AcDc.png" alt="" />
                </div>
                <div class="music-middle-title">
                    <h3 class="title-artist">ARTIEST</h3>
                    <p>TITEL</p>
                </div>
                <div class="music-middle-player">
                    <div class="previous-logo">
                        <button class="player-buttons">
                            <img class="player-logo" src="./assets/icons/previous-track-icon.png" alt="" />
                        </button>
                    </div>
                    <div class="play-logo">
                        <button class="player-buttons">
                            <img class="player-logo" src="./assets/icons//playIcon.png" alt="" />
                        </button>
                    </div>
                    <div class="next-logo">
                        <button class="player-buttons">
                            <img class="player-logo" src="./assets/icons/next-track-icon.png" alt="" />
                        </button>
                    </div>
                </div>
            </div>
        </section>
</section>
        <!-- EINDE MUSIC-PLAYER     HEADER EN SPELER COPY NAAR ANDERE PAGINA'S ALS IEDEREEN DEZE GOED VIND.  -->

        <!-- START GAME  -->
         <section class="guess-content">
            <section class="guess-card">
                <button id="reset-btn" class="reset-badge">Reset</button>
                <div class="score-badge">
                    Mood Score: <span id="current-score">0</span>
                </div>
                
                <div class="player-visual">
                    <div id="cover-container" class="unknown-art">?</div>
                    
                    <div class="audio-controls">
                        <button id="play-btn" class="play-preview-btn">
                            <img id="play-icon-img" src="./assets/icons/playIcon.png" alt="Play">
                        </button>
                        <p id="status-text">Klik op play voor een preview</p>
                        <audio id="music-preview" src=""></audio>
                    </div>
                </div>

                <div class="guess-form">
                    <h2>Welk nummer hoor je?</h2>
                    
                    <div class="input-group">
                        <input type="text" id="guess-input" list="song-options" placeholder="Typ titel of artiest...">
                        <datalist id="song-options">
                            <option value="AC/DC - Back In Black">
                            <option value="Metallica - Enter Sandman">
                            <option value="Nirvana - Smells Like Teen Spirit">
                        </datalist>
                    </div>

                    <button id="submit-btn" class="submit-guess-btn">Raad nummer!</button>
                </div>

                <div id="feedback" class="feedback-area hidden"></div>
            </section>
        <!-- EINDE GAME  -->
    </main>
    <footer>
        <p>&copy;AP-Music</p>
    </footer>
</body>

</html>
